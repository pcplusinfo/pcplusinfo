<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pcplusinfo Solutions | Enterprise ERP</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="login-page" class="auth-container">
    <div class="auth-card">
        <img src="logo.png" class="auth-logo" alt="Pcplusinfo Logo">
        <h2>Pcplusinfo Solutions</h2>
        <input type="password" id="pinInput" placeholder="Enter Staff PIN (Default 7447)">
        <button class="btn btn-primary" onclick="checkLogin()">Login</button>
    </div>
</div>

<div id="main-app" style="display:none;">
    <div class="sidebar no-print">
        <div class="sidebar-header">
            <img src="logo.png" alt="Logo" class="logo-img">
            <h3>Pcplusinfo</h3>
        </div>
        <nav>
            <p onclick="showSection('dashboard')">📊 Dashboard</p>
            <p onclick="showSection('new-repair')">🔧 New Repair Job</p>
            <p onclick="showSection('repairs-list')">📋 Repair List</p>
            <p onclick="showSection('inventory')">📦 Inventory & Parts</p>
            <p onclick="showSection('billing')">🧾 Sale Invoice</p>
            <p onclick="showSection('purchase')">🛒 Purchase Invoice</p>
            <p onclick="showSection('expenses')">💸 Expenses</p>
            <p onclick="showSection('profile')">👤 My Profile</p>
        </nav>
        <div class="sidebar-footer">
            <button class="btn btn-outline" onclick="backupToExcel()">📥 Backup Data</button>
            <button class="btn btn-outline" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar no-print">
            <div class="live-revenue">Live Revenue: <span id="live-rev">₹ 0</span></div>
            <div class="user-info-corner">
                <p><strong>Akash Pramod Gade</strong></p>
                <small>+91 7447744751</small>
            </div>
        </div>

        <section id="dashboard" class="section">
            <div class="grid-3">
                <div class="card stat-card pending"><h4>Pending</h4><h2 id="dash-pending">0</h2></div>
                <div class="card stat-card completed"><h4>Completed</h4><h2 id="dash-done">0</h2></div>
                <div class="card stat-card revenue"><h4>Total Sales</h4><h2 id="dash-sales">₹ 0</h2></div>
            </div>
            <div class="card">
                <h3>Recent Activity</h3>
                <div id="recent-list"></div>
            </div>
        </section>

        <section id="new-repair" class="section" style="display:none;">
            <div class="card">
                <h2 class="section-title">New Repair Intake</h2>
                
                <div class="form-grid">
